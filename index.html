<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Athva Agent</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <!-- Welcome Page -->
      <div id="welcome-page" class="page">
        <div class="welcome-container">
          <!-- Left: Start Section -->
          <div class="welcome-left">
            <div class="brand">
              <h1 class="brand-name">Athva Agent</h1>
              <span class="brand-version">v0.1.0</span>
            </div>

            <div class="start-section">
              <h2 class="section-title">Start</h2>
              <button id="btn-open-folder" class="action-btn">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M1.5 2A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5V5.5A1.5 1.5 0 0 0 14.5 4H8.21l-1.6-1.6A1.5 1.5 0 0 0 5.55 2H1.5z"/>
                </svg>
                Open Folder...
              </button>
              <button id="btn-create-project" class="action-btn">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2z"/>
                </svg>
                Create New Project...
              </button>
            </div>
          </div>

          <!-- Right: Recent Projects -->
          <div class="welcome-right">
            <h2 class="section-title">Recent</h2>
            <div id="recent-projects" class="recent-list">
              <p class="empty-state">No recent projects</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Create Project Dialog -->
      <div id="create-dialog" class="dialog-overlay hidden">
        <div class="dialog">
          <h2>Create New Project</h2>
          <div class="dialog-field">
            <label for="project-path-input">Project Path</label>
            <div class="path-input-row">
              <input id="project-path-input" type="text" placeholder="/path/to/your/project" />
              <button id="btn-browse-path" class="btn-secondary">Browse</button>
            </div>
            <p class="hint">The folder name will be used as the project name.</p>
          </div>
          <div class="dialog-actions">
            <button id="btn-cancel-create" class="btn-secondary">Cancel</button>
            <button id="btn-confirm-create" class="btn-primary">Create</button>
          </div>
        </div>
      </div>

      <!-- Project Workspace (shown after selecting a project) -->
      <div id="workspace-page" class="page hidden">
        <div class="workspace-header">
          <button id="btn-back-home" class="btn-icon" title="Back to Home">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0z"/>
            </svg>
          </button>
          <span id="workspace-project-name" class="workspace-title"></span>
        </div>
        <div class="workspace-body">
          <p class="workspace-path" id="workspace-project-path"></p>
          <p class="workspace-hint">Project loaded. Workspace is ready.</p>
        </div>
      </div>
    </div>
  </body>
</html>
