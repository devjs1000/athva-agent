[[permission]]
identifier = "allow-app-commands"
description = "Allow all custom app commands"
commands.allow = [
  "get_projects",
  "add_project",
  "remove_project",
  "check_path_exists",
  "kill_process_tree",
  "read_dir",
  "read_file",
  "write_file",
  "create_file",
  "create_dir",
  "rename_path",
  "delete_path",
  "reveal_in_explorer",
  "search_files",
  "search_in_files",
  "replace_in_files",
  "git_status",
  "git_sync",
  "git_pull",
  "git_push",
  "git_changed_files",
  "git_stage",
  "git_unstage",
  "git_stage_all",
  "git_unstage_all",
  "git_discard_file",
  "git_commit",
  "git_diff_stat",
  "git_diff_file",
  "load_settings",
  "save_settings",
  "memory_init",
  "memory_add",
  "memory_search",
  "memory_list",
  "memory_delete",
  "memory_clear",
  "memory_stats"
]
